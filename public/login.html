<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spot.AI Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink-950: #020d17;
        --ink-900: #071824;
        --mist: #eef8fb;
        --body: #9cb9c8;
        --harbor: #53d6df;
        --violet: #8d8cff;
        --line: rgba(131, 224, 232, 0.18);
        --danger: #ff9b89;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Space Grotesk", system-ui, sans-serif;
        color: var(--mist);
        background:
          radial-gradient(circle at 20% 20%, rgba(83,214,223,0.2), transparent 20%),
          radial-gradient(circle at 80% 12%, rgba(141,140,255,0.2), transparent 20%),
          linear-gradient(160deg, #020d17 0%, #081827 44%, #07121b 100%);
      }
      .login-card {
        width: min(500px, calc(100% - 32px));
        padding: 30px;
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(12,28,43,0.9), rgba(7,18,29,0.96));
        border: 1px solid var(--line);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.36);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
      }
      .dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 30% 30%, #ffffff 0%, #87f7df 18%, #53d6df 42%, #8d8cff 100%);
        box-shadow: 0 0 22px rgba(83,214,223,0.46);
      }
      .brand span:last-child {
        font-family: "Sora", sans-serif;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }
      .tabs {
        display: flex;
        gap: 10px;
        margin: 22px 0 18px;
      }
      .tab {
        border: 1px solid rgba(131, 224, 232, 0.14);
        border-radius: 999px;
        padding: 10px 16px;
        background: rgba(255,255,255,0.04);
        color: var(--mist);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      .tab.active {
        background: linear-gradient(135deg, var(--harbor), var(--violet));
        color: #04111d;
        border-color: transparent;
      }
      h1 {
        margin: 0 0 10px;
        font-family: "Sora", sans-serif;
        font-size: 34px;
        line-height: 1.02;
        letter-spacing: -0.05em;
      }
      p {
        color: var(--body);
        margin: 0 0 20px;
      }
      label {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
        font-weight: 700;
      }
      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(131, 224, 232, 0.14);
        background: rgba(3, 17, 29, 0.88);
        color: var(--mist);
        outline: none;
      }
      button[type="submit"] {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 800;
        color: #04111d;
        background: linear-gradient(135deg, var(--harbor), var(--violet));
        cursor: pointer;
      }
      .meta {
        margin-top: 14px;
        font-size: 13px;
        color: var(--body);
      }
      .error {
        min-height: 22px;
        margin-top: 14px;
        color: var(--danger);
      }
      .success {
        color: #9ef0b6;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <div class="brand">
        <span class="dot"></span>
        <span>Spot.AI</span>
      </div>
      <h1 id="title">Sign in to open the lab</h1>
      <p id="subtitle">Use a Supabase Auth user to access the application securely.</p>

      <div class="tabs">
        <button class="tab active" data-mode="login" type="button">Sign In</button>
        <button class="tab" data-mode="signup" type="button">Create User</button>
      </div>

      <form id="auth-form">
        <label id="name-field" class="hidden">
          Full name
          <input id="fullName" name="fullName" type="text" autocomplete="name" />
        </label>
        <label>
          Email
          <input id="email" name="email" type="email" autocomplete="email" required autofocus />
        </label>
        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <button id="submit-button" type="submit">Sign In</button>
      </form>

      <div id="message" class="error"></div>
      <div class="meta">
        If email confirmation is enabled in Supabase, new users may need to confirm their email before signing in.
      </div>
    </main>

    <script>
      const tabs = [...document.querySelectorAll(".tab")];
      const form = document.getElementById("auth-form");
      const title = document.getElementById("title");
      const subtitle = document.getElementById("subtitle");
      const submitButton = document.getElementById("submit-button");
      const nameField = document.getElementById("name-field");
      const message = document.getElementById("message");
      let mode = "login";

      function setMode(nextMode) {
        mode = nextMode;
        for (const tab of tabs) {
          tab.classList.toggle("active", tab.dataset.mode === nextMode);
        }

        const isSignup = nextMode === "signup";
        title.textContent = isSignup ? "Create a secure user" : "Sign in to open the lab";
        subtitle.textContent = isSignup
          ? "Create a Supabase Auth user for secure access to the application."
          : "Use a Supabase Auth user to access the application securely.";
        submitButton.textContent = isSignup ? "Create User" : "Sign In";
        nameField.classList.toggle("hidden", !isSignup);
        document.getElementById("fullName").required = isSignup;
        message.textContent = "";
        message.classList.remove("success");
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => setMode(tab.dataset.mode));
      });

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Request failed.");
        }

        return data;
      }

      function normalizeAuthError(error, currentMode) {
        const rawMessage = String(error?.message || "Request failed.");
        const lowerMessage = rawMessage.toLowerCase();

        if (currentMode === "signup" && lowerMessage.includes("email rate limit exceeded")) {
          return "That account likely already exists. Check your inbox for the confirmation email, or switch to Sign In if the email has already been confirmed.";
        }

        if (currentMode === "signup" && lowerMessage.includes("user already registered")) {
          return "That email is already registered. Use Sign In instead.";
        }

        if (currentMode === "login" && lowerMessage.includes("email not confirmed")) {
          return "Your account exists, but the email address still needs to be confirmed before you can sign in.";
        }

        return rawMessage;
      }

      async function checkExistingSession() {
        try {
          const response = await fetch("/api/auth/status");
          const data = await response.json();

          if (data.authenticated) {
            window.location.href = "/";
          }
        } catch {
          // Ignore and stay on login screen.
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";
        message.classList.remove("success");

        const payload = {
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
          fullName: document.getElementById("fullName").value.trim()
        };

        try {
          if (mode === "signup") {
            const data = await postJson("/api/auth/signup", payload);

            if (data.requiresEmailConfirmation) {
              message.textContent = "User created. Check the email inbox to confirm the account before signing in.";
              message.classList.add("success");
              setMode("login");
              return;
            }
          } else {
            await postJson("/api/auth/login", payload);
          }

          window.location.href = "/";
        } catch (error) {
          message.textContent = normalizeAuthError(error, mode);
        }
      });

      checkExistingSession();
    </script>
  </body>
</html>
