<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password | Spot.AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink-950: #020d17;
        --mist: #eef8fb;
        --body: #9cb9c8;
        --harbor: #53d6df;
        --violet: #8d8cff;
        --line: rgba(131, 224, 232, 0.18);
        --danger: #ff9b89;
        --success: #9ef0b6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Space Grotesk", system-ui, sans-serif;
        color: var(--mist);
        background:
          radial-gradient(circle at 20% 20%, rgba(83,214,223,0.2), transparent 20%),
          radial-gradient(circle at 80% 12%, rgba(141,140,255,0.2), transparent 20%),
          linear-gradient(160deg, #020d17 0%, #081827 44%, #07121b 100%);
      }
      .card {
        width: min(500px, calc(100% - 32px));
        padding: 30px;
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(12,28,43,0.9), rgba(7,18,29,0.96));
        border: 1px solid var(--line);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.36);
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
      }
      .dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 30% 30%, #ffffff 0%, #87f7df 18%, #53d6df 42%, #8d8cff 100%);
        box-shadow: 0 0 22px rgba(83,214,223,0.46);
      }
      .brand span:last-child {
        font-family: "Sora", sans-serif;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }
      h1 {
        margin: 0 0 10px;
        font-family: "Sora", sans-serif;
        font-size: 34px;
        line-height: 1.02;
        letter-spacing: -0.05em;
      }
      p {
        color: var(--body);
        margin: 0 0 20px;
      }
      label {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
        font-weight: 700;
      }
      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(131, 224, 232, 0.14);
        background: rgba(3, 17, 29, 0.88);
        color: var(--mist);
        outline: none;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 800;
        color: #04111d;
        background: linear-gradient(135deg, var(--harbor), var(--violet));
        cursor: pointer;
      }
      .message {
        min-height: 22px;
        margin-top: 14px;
        color: var(--danger);
      }
      .message.success {
        color: var(--success);
      }
      .hidden {
        display: none;
      }
      .meta-link {
        display: inline-block;
        margin-top: 16px;
        color: var(--mist);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <span class="dot"></span>
        <span>Spot.AI</span>
      </div>
      <h1>Reset your password</h1>
      <p id="subtitle">Finish the recovery flow and set a new password for your account.</p>

      <form id="reset-form" class="hidden">
        <label>
          New password
          <input id="password" name="password" type="password" autocomplete="new-password" required />
        </label>
        <label>
          Confirm new password
          <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required />
        </label>
        <button type="submit">Update Password</button>
      </form>

      <div id="message" class="message">Checking recovery link...</div>
      <a class="meta-link" href="/login">Back to login</a>
    </main>

    <script>
      const form = document.getElementById("reset-form");
      const message = document.getElementById("message");

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Request failed.");
        }

        return data;
      }

      function showMessage(text, isSuccess = false) {
        message.textContent = text;
        message.classList.toggle("success", isSuccess);
      }

      async function establishSessionFromHash() {
        const hash = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        const accessToken = hash.get("access_token");
        const refreshToken = hash.get("refresh_token");

        if (!accessToken || !refreshToken) {
          return false;
        }

        await postJson("/api/auth/recovery-session", {
          accessToken,
          refreshToken
        });

        history.replaceState({}, document.title, window.location.pathname);
        return true;
      }

      async function hasRecoverySession() {
        const response = await fetch("/api/auth/status");
        const data = await response.json();
        return Boolean(data.authenticated);
      }

      async function initialize() {
        try {
          await establishSessionFromHash();
        } catch (error) {
          showMessage(error.message || "That recovery link is invalid or expired.");
          return;
        }

        try {
          const ready = await hasRecoverySession();

          if (!ready) {
            showMessage("That recovery link is invalid or expired. Request a new password reset email from the login screen.");
            return;
          }

          form.classList.remove("hidden");
          showMessage("Recovery link verified. Set your new password.", true);
        } catch {
          showMessage("Unable to verify the recovery session. Request a new password reset email.");
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (!password || password !== confirmPassword) {
          showMessage("Passwords do not match.");
          return;
        }

        try {
          await postJson("/api/auth/update-password", { password });
          showMessage("Password updated. Redirecting into the app...", true);
          window.setTimeout(() => {
            window.location.href = "/";
          }, 1200);
        } catch (error) {
          showMessage(error.message || "Unable to update password.");
        }
      });

      initialize();
    </script>
  </body>
</html>
